<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>F01 — The Established App</title>
<style>
/* Shared theme variables for all frames */
:root {
  --bg: #0f0f0f; --surface: #1a1a1a; --surface2: #1f1f1f; --surface3: #272727;
  --border: #272727; --border2: #3f3f3f; --text: #e4e4e7; --muted: #8c8c8c;
  --accent: #056ff0; --accent-dim: #056ff022; --green: #22c55e; --green-dim: #22c55e22;
  --amber: #d97706; --amber-dim: #fbbf2422; --red: #f87171; --red-dim: #f8717122;
  --shadow: 0 20px 60px rgba(0,0,0,0.5);
}
[data-theme="light"] {
  --bg: #f2f2f2; --surface: #ffffff; --surface2: #f7f7f7; --surface3: #ebebeb;
  --border: #d4d4d4; --border2: #c0c0c0; --text: #1a1a1a; --muted: #666666;
  --accent: #056ff0; --accent-dim: #056ff012; --green: #16a34a; --green-dim: #16a34a12;
  --amber: #d97706; --amber-dim: #d9770612; --red: #dc2626; --red-dim: #dc262612;
  --shadow: 0 20px 60px rgba(0,0,0,0.08);
}
[data-theme="vibrant"] {
  --bg: #1a0033; --surface: #2d0a52; --surface2: #3a1066; --surface3: #4a1a82;
  --border: #5b2a99; --border2: #7d3dcc; --text: #fff8ff; --muted: #b896d4;
  --accent: #ff2eb8; --accent-dim: #ff2eb822; --green: #00ffaa; --green-dim: #00ffaa22;
  --amber: #ffd23f; --amber-dim: #ffd23f22; --red: #ff3860; --red-dim: #ff386022;
  --shadow: 0 20px 60px rgba(155,30,200,0.4);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: var(--bg); display: flex; align-items: center; justify-content: center; min-height: 100vh; font-family: 'Segoe UI', system-ui, sans-serif; }
.controls {
  position: fixed; top: 16px; right: 16px; display: flex; gap: 6px; z-index: 100;
}
.ctrl-btn {
  padding: 8px 16px; background: var(--surface); border: 1px solid var(--border);
  border-radius: 8px; color: var(--muted); font-size: 12px; cursor: pointer;
  font-family: monospace; transition: all 0.2s ease;
}
.ctrl-btn:hover { color: var(--text); border-color: var(--border2); }


  .swing-app{width:640px;background:var(--surface);border:1px solid var(--border);border-radius:8px;overflow:hidden;box-shadow:var(--shadow);opacity:0;animation:fadeIn .8s ease forwards}
  @keyframes fadeIn{to{opacity:1}}
  .titlebar{background:var(--surface3);padding:10px 14px;display:flex;align-items:center;gap:6px;border-bottom:1px solid var(--border)}
  .dot{width:10px;height:10px;border-radius:50%}.dot.r{background:var(--red);opacity:.7}.dot.y{background:var(--amber);opacity:.7}.dot.g{background:var(--green);opacity:.7}
  .titlebar-text{margin-left:10px;font-size:12px;color:var(--muted);font-family:monospace}
  .menubar{background:var(--surface2);padding:6px 10px;display:flex;gap:2px;border-bottom:1px solid var(--border)}
  .menu-item{padding:4px 12px;font-size:12px;color:var(--muted);border-radius:4px}
  .toolbar{background:var(--surface2);padding:6px 10px;display:flex;gap:6px;border-bottom:1px solid var(--border)}
  .tool-btn{padding:4px 14px;font-size:11px;color:var(--muted);background:var(--surface3);border:1px solid var(--border2);border-radius:4px}
  .app-content{display:grid;grid-template-columns:160px 1fr;min-height:300px}
  .sidebar{border-right:1px solid var(--border);padding:8px 0}
  .sidebar-item{padding:8px 14px;font-size:12px;color:var(--muted)}.sidebar-item.active{background:var(--surface3);color:var(--text);border-left:2px solid var(--accent)}
  .main{padding:12px}
  .th{display:grid;grid-template-columns:60px 1fr 80px 80px 100px;padding:8px 10px;background:var(--surface3);border-radius:4px 4px 0 0;border:1px solid var(--border);border-bottom:none}
  .th span{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
  .tb{border:1px solid var(--border);border-radius:0 0 4px 4px}
  .tr{display:grid;grid-template-columns:60px 1fr 80px 80px 100px;padding:8px 10px;border-bottom:1px solid var(--surface2);opacity:0;transform:translateY(4px)}
  .tr:last-child{border-bottom:none}.tr span{font-size:11px;color:var(--text);font-family:monospace}.tr .id{color:var(--muted)}
  .st{padding:2px 8px;border-radius:3px;font-size:10px!important;display:inline-block}
  .st.a{background:var(--green-dim);color:var(--green)}.st.r{background:var(--amber-dim);color:var(--amber)}.st.p{background:var(--accent-dim);color:var(--accent)}
  .statusbar{background:var(--surface2);padding:6px 14px;display:flex;justify-content:space-between;border-top:1px solid var(--border);font-size:10px;color:var(--muted);font-family:monospace}

</style><meta name="h2v-duration" content="5s"><meta name="h2v-themes" content="dark,light,vibrant"><meta name="h2v-viewport" content="1280x720"></head><body>
<div class="controls" data-h2v-hide><button class="ctrl-btn" onclick="resetAnim()">↺ Reset</button><button class="ctrl-btn" onclick="startAnim()">▶ Start</button><button class="ctrl-btn" id="themeBtn" onclick="toggleTheme()">☀ Light</button></div>

<div class="swing-app">
  <div class="titlebar"><div class="dot r"></div><div class="dot y"></div><div class="dot g"></div><span class="titlebar-text">InventoryManager — v4.2.1 [Production]</span></div>
  <div class="menubar"><div class="menu-item">File</div><div class="menu-item">Edit</div><div class="menu-item">View</div><div class="menu-item">Tools</div><div class="menu-item">Reports</div><div class="menu-item">Help</div></div>
  <div class="toolbar"><div class="tool-btn">🔄 Refresh</div><div class="tool-btn">➕ New Item</div><div class="tool-btn">📋 Export</div><div class="tool-btn">🔍 Search</div></div>
  <div class="app-content">
    <div class="sidebar"><div class="sidebar-item active">Inventory</div><div class="sidebar-item">Orders</div><div class="sidebar-item">Suppliers</div><div class="sidebar-item">Reports</div><div class="sidebar-item">Settings</div></div>
    <div class="main"><div class="th"><span>ID</span><span>Product</span><span>Qty</span><span>Price</span><span>Status</span></div><div class="tb" id="tb"></div></div>
  </div>
  <div class="statusbar"><span>Connected to db-prod-01 | 8 items</span><span id="clock"></span></div>
</div>

<script>
function toggleTheme(){const o=['dark','light','vibrant'];const c=document.documentElement.getAttribute('data-theme')||'dark';const n=o[(o.indexOf(c)+1)%o.length];document.documentElement.setAttribute('data-theme',n);const a=o[(o.indexOf(n)+1)%o.length];const l={dark:'🌙 Dark',light:'☀ Light',vibrant:'🎨 Vibrant'};document.getElementById('themeBtn').textContent=l[a]}
function resetAnim(){location.reload()}
function startAnim(){resetAnim()}
window.addEventListener('message',function(e){if(e.data&&e.data.theme){document.documentElement.setAttribute('data-theme',e.data.theme)}});

const R=[['1041','Industrial Valve A-7','340','$127.50','a','Active'],['1042','Pressure Gauge B-3','128','$84.00','a','Active'],['1043','Control Module C-1','57','$312.00','r','Review'],['1044','Hydraulic Pump D-9','812','$445.75','a','Active'],['1045','Thermal Sensor E-2','96','$63.20','p','Pending'],['1046','Actuator Assembly F-4','215','$189.00','a','Active'],['1047','Filter Cartridge G-6','1430','$22.50','a','Active'],['1048','Relay Switch H-8','67','$156.80','r','Review']];
const t=document.getElementById('tb');R.forEach((r,i)=>{const e=document.createElement('div');e.className='tr';e.innerHTML=`<span class="id">${r[0]}</span><span>${r[1]}</span><span>${r[2]}</span><span>${r[3]}</span><span><span class="st ${r[4]}">${r[5]}</span></span>`;t.appendChild(e);setTimeout(()=>{e.style.transition='opacity .3s,transform .3s';e.style.opacity='1';e.style.transform='translateY(0)'},800+i*150)});
function uc(){document.getElementById('clock').textContent=new Date().toLocaleTimeString()}uc();setInterval(uc,1000);

</script></body></html>
