<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>F02 — Growing Friction</title>
<style>
/* Shared theme variables for all frames */
:root {
  --bg: #0f0f0f; --surface: #1a1a1a; --surface2: #1f1f1f; --surface3: #272727;
  --border: #272727; --border2: #3f3f3f; --text: #e4e4e7; --muted: #8c8c8c;
  --accent: #056ff0; --accent-dim: #056ff022; --green: #22c55e; --green-dim: #22c55e22;
  --amber: #d97706; --amber-dim: #fbbf2422; --red: #f87171; --red-dim: #f8717122;
  --shadow: 0 20px 60px rgba(0,0,0,0.5);
}
[data-theme="light"] {
  --bg: #f2f2f2; --surface: #ffffff; --surface2: #f7f7f7; --surface3: #ebebeb;
  --border: #d4d4d4; --border2: #c0c0c0; --text: #1a1a1a; --muted: #666666;
  --accent: #056ff0; --accent-dim: #056ff012; --green: #16a34a; --green-dim: #16a34a12;
  --amber: #d97706; --amber-dim: #d9770612; --red: #dc2626; --red-dim: #dc262612;
  --shadow: 0 20px 60px rgba(0,0,0,0.08);
}
[data-theme="vibrant"] {
  --bg: #1a0033; --surface: #2d0a52; --surface2: #3a1066; --surface3: #4a1a82;
  --border: #5b2a99; --border2: #7d3dcc; --text: #fff8ff; --muted: #b896d4;
  --accent: #ff2eb8; --accent-dim: #ff2eb822; --green: #00ffaa; --green-dim: #00ffaa22;
  --amber: #ffd23f; --amber-dim: #ffd23f22; --red: #ff3860; --red-dim: #ff386022;
  --shadow: 0 20px 60px rgba(155,30,200,0.4);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: var(--bg); display: flex; align-items: center; justify-content: center; min-height: 100vh; font-family: 'Segoe UI', system-ui, sans-serif; }
.controls {
  position: fixed; top: 16px; right: 16px; display: flex; gap: 8px; align-items: center; z-index: 100;
}
.ctrl-btn {
  padding: 8px 16px; background: var(--surface); border: 1px solid var(--border);
  border-radius: 8px; color: var(--muted); font-size: 12px; cursor: pointer;
  font-family: monospace; transition: all 0.2s ease;
}
.ctrl-btn:hover { color: var(--text); border-color: var(--border2); }
.swatch {
  width: 28px; height: 28px; border-radius: 50%;
  border: 2px solid transparent; padding: 0; cursor: pointer;
  transition: transform 0.15s ease, border-color 0.15s ease;
}
.swatch:hover { transform: scale(1.1); }
.swatch[aria-pressed="true"] { border-color: var(--text); transform: scale(1.1); }
.swatch[data-theme-target="dark"]    { background: linear-gradient(135deg, #0f0f0f 0%, #056ff0 100%); }
.swatch[data-theme-target="light"]   { background: linear-gradient(135deg, #ffffff 0%, #056ff0 100%); }
.swatch[data-theme-target="vibrant"] { background: linear-gradient(135deg, #1a0033 0%, #ff2eb8 100%); }


  @keyframes fadeIn{to{opacity:1}}
  .grid{display:grid;grid-template-columns:repeat(5,1fr);gap:24px}
  .desktop{display:flex;flex-direction:column;align-items:center;gap:8px;opacity:0}
  .monitor{width:72px;height:52px;border:2px solid var(--border);border-radius:5px;display:flex;align-items:center;justify-content:center;background:var(--surface);position:relative}
  .monitor::after{content:'';position:absolute;bottom:-8px;width:28px;height:5px;background:var(--border);border-radius:0 0 3px 3px}
  .status-icon{font-size:22px;opacity:0;transform:scale(.5);transition:opacity .3s,transform .3s}.status-icon.visible{opacity:1;transform:scale(1)}
  .desktop.ok .monitor{border-color:var(--green);background:var(--green-dim)}.desktop.ok .monitor::after{background:var(--green);opacity:.4}.desktop.ok .status-icon{color:var(--green)}
  .desktop.fail .monitor{border-color:var(--red);background:var(--red-dim)}.desktop.fail .monitor::after{background:var(--red);opacity:.4}.desktop.fail .status-icon{color:var(--red)}
  .desktop.pending .monitor{border-color:var(--amber);background:var(--amber-dim)}.desktop.pending .monitor::after{background:var(--amber);opacity:.4}
  .pc-label{font-family:monospace;font-size:10px;color:var(--muted)}
  @keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-4px)}40%{transform:translateX(4px)}60%{transform:translateX(-3px)}80%{transform:translateX(2px)}}
  .desktop.fail .monitor{animation:shake .4s ease}
  .container{display:flex;flex-direction:column;align-items:center;gap:30px}
  .progress-bar{width:400px;opacity:0;animation:fadeIn .5s ease .5s forwards}
  .progress-label{display:flex;justify-content:space-between;margin-bottom:6px;font-size:11px;font-family:monospace;color:var(--muted)}
  .progress-track{height:6px;background:var(--surface3);border-radius:3px;overflow:hidden}
  .progress-fill{height:100%;width:0%;border-radius:3px;transition:width .3s,background .3s;background:var(--green)}

</style><meta name="h2v-duration" content="11s"><meta name="h2v-themes" content="dark,light,vibrant"><meta name="h2v-viewport" content="1280x720"></head><body>
<div class="controls" data-h2v-hide><button class="ctrl-btn" onclick="location.reload()">↺ Reset</button><button class="swatch" data-theme-target="dark" aria-label="Dark" aria-pressed="true"></button><button class="swatch" data-theme-target="light" aria-label="Light" aria-pressed="false"></button><button class="swatch" data-theme-target="vibrant" aria-label="Vibrant" aria-pressed="false"></button></div>

<div class="container">
  <div class="progress-bar">
    <div class="progress-label"><span>Deploying v4.2.2</span><span id="pText">0 / 15</span></div>
    <div class="progress-track"><div class="progress-fill" id="pFill"></div></div>
  </div>
  <div class="grid" id="grid"></div>
</div>

<script>
const DEFAULT_THEME='dark';
function applyTheme(t){if(t===DEFAULT_THEME){document.documentElement.removeAttribute('data-theme')}else{document.documentElement.setAttribute('data-theme',t)}syncSwatches()}
function syncSwatches(){const c=document.documentElement.getAttribute('data-theme')||DEFAULT_THEME;document.querySelectorAll('.swatch').forEach(b=>b.setAttribute('aria-pressed',b.getAttribute('data-theme-target')===c?'true':'false'))}
document.querySelectorAll('.swatch').forEach(b=>b.addEventListener('click',()=>applyTheme(b.getAttribute('data-theme-target'))));

const M=[{n:'WS-001',r:'ok'},{n:'WS-002',r:'ok'},{n:'WS-003',r:'fail'},{n:'WS-004',r:'ok'},{n:'WS-005',r:'ok'},{n:'WS-006',r:'ok'},{n:'WS-007',r:'fail'},{n:'WS-008',r:'ok'},{n:'WS-009',r:'fail'},{n:'WS-010',r:'ok'},{n:'WS-011',r:'ok'},{n:'WS-012',r:'fail'},{n:'WS-013',r:'ok'},{n:'WS-014',r:'ok'},{n:'WS-015',r:'fail'}];
const g=document.getElementById('grid'),pF=document.getElementById('pFill'),pT=document.getElementById('pText');
M.forEach((m,i)=>{const e=document.createElement('div');e.className='desktop';e.id='d'+i;e.innerHTML=`<div class="monitor"><span class="status-icon" id="ic${i}">${m.r==='ok'?'✓':'✗'}</span></div><span class="pc-label">${m.n}</span>`;g.appendChild(e);setTimeout(()=>{e.style.transition='opacity .3s';e.style.opacity='1'},300+i*80)});
let dep=0,fail=0;
M.forEach((m,i)=>{setTimeout(()=>{const d=document.getElementById('d'+i);d.className='desktop pending';setTimeout(()=>{d.className='desktop '+m.r;document.getElementById('ic'+i).classList.add('visible');dep++;if(m.r==='fail')fail++;pF.style.width=(dep/M.length*100)+'%';if(fail>0)pF.style.background=fail>2?'var(--red)':'var(--amber)';pT.textContent=dep+' / '+M.length+(fail>0?' · '+fail+' failed':'');if(fail>0)pT.style.color='var(--red)'},300)},1800+i*400)});

</script></body></html>
