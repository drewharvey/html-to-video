<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>F09 — Automation</title>
<style>
/* Shared theme variables for all frames */
:root {
  --bg: #0f0f0f; --surface: #1a1a1a; --surface2: #1f1f1f; --surface3: #272727;
  --border: #272727; --border2: #3f3f3f; --text: #e4e4e7; --muted: #8c8c8c;
  --accent: #056ff0; --accent-dim: #056ff022; --green: #22c55e; --green-dim: #22c55e22;
  --amber: #d97706; --amber-dim: #fbbf2422; --red: #f87171; --red-dim: #f8717122;
  --shadow: 0 20px 60px rgba(0,0,0,0.5);
}
[data-theme="light"] {
  --bg: #f2f2f2; --surface: #ffffff; --surface2: #f7f7f7; --surface3: #ebebeb;
  --border: #d4d4d4; --border2: #c0c0c0; --text: #1a1a1a; --muted: #666666;
  --accent: #056ff0; --accent-dim: #056ff012; --green: #16a34a; --green-dim: #16a34a12;
  --amber: #d97706; --amber-dim: #d9770612; --red: #dc2626; --red-dim: #dc262612;
  --shadow: 0 20px 60px rgba(0,0,0,0.08);
}
[data-theme="vibrant"] {
  --bg: #1a0033; --surface: #2d0a52; --surface2: #3a1066; --surface3: #4a1a82;
  --border: #5b2a99; --border2: #7d3dcc; --text: #fff8ff; --muted: #b896d4;
  --accent: #ff2eb8; --accent-dim: #ff2eb822; --green: #00ffaa; --green-dim: #00ffaa22;
  --amber: #ffd23f; --amber-dim: #ffd23f22; --red: #ff3860; --red-dim: #ff386022;
  --shadow: 0 20px 60px rgba(155,30,200,0.4);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: var(--bg); display: flex; align-items: center; justify-content: center; min-height: 100vh; font-family: 'Segoe UI', system-ui, sans-serif; }
.controls {
  position: fixed; top: 16px; right: 16px; display: flex; gap: 8px; align-items: center; z-index: 100;
}
.ctrl-btn {
  padding: 8px 16px; background: var(--surface); border: 1px solid var(--border);
  border-radius: 8px; color: var(--muted); font-size: 12px; cursor: pointer;
  font-family: monospace; transition: all 0.2s ease;
}
.ctrl-btn:hover { color: var(--text); border-color: var(--border2); }
.swatch {
  width: 28px; height: 28px; border-radius: 50%;
  border: 2px solid transparent; padding: 0; cursor: pointer;
  transition: transform 0.15s ease, border-color 0.15s ease;
}
.swatch:hover { transform: scale(1.1); }
.swatch[aria-pressed="true"] { border-color: var(--text); transform: scale(1.1); }
.swatch[data-theme-target="dark"]    { background: linear-gradient(135deg, #0f0f0f 0%, #056ff0 100%); }
.swatch[data-theme-target="light"]   { background: linear-gradient(135deg, #ffffff 0%, #056ff0 100%); }
.swatch[data-theme-target="vibrant"] { background: linear-gradient(135deg, #1a0033 0%, #ff2eb8 100%); }


  .container{text-align:center}
  .ring-wrap{position:relative;width:180px;height:180px;margin:0 auto 24px}
  svg.ring{width:180px;height:180px;transform:rotate(-90deg)}
  .ring-bg{fill:none;stroke:var(--surface3);stroke-width:12}
  .ring-fill{fill:none;stroke:var(--accent);stroke-width:12;stroke-linecap:round;stroke-dasharray:440;stroke-dashoffset:440;transition:stroke-dashoffset 2.5s cubic-bezier(.4,0,.2,1)}
  .ring-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center}
  .ring-pct{font-family:monospace;font-size:36px;font-weight:700;color:var(--accent)}
  .ring-label{font-family:monospace;font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-top:2px}
  .legend{display:flex;gap:28px;justify-content:center;margin-bottom:28px;opacity:0;transform:translateY(8px);transition:opacity .5s,transform .5s}.legend.visible{opacity:1;transform:translateY(0)}
  .li{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--muted)}
  .ld{width:10px;height:10px;border-radius:50%}.ld.a{background:var(--accent)}.ld.m{background:var(--surface3)}
  .java-badge{display:inline-flex;align-items:center;gap:10px;padding:12px 24px;background:var(--green-dim);border:1px solid color-mix(in srgb,var(--green) 30%,transparent);border-radius:10px;opacity:0;transform:translateY(10px);transition:opacity .5s,transform .5s}
  .java-badge.visible{opacity:1;transform:translateY(0)}
  .java-title{font-size:14px;font-weight:600;color:var(--green)}

</style><meta name="h2v-duration" content="7s"><meta name="h2v-themes" content="dark,light,vibrant"><meta name="h2v-viewport" content="1280x720"><script>try{var t=sessionStorage.getItem('h2v-theme');if(t)document.documentElement.setAttribute('data-theme',t);}catch(e){}</script></head><body>
<div class="controls" data-h2v-hide><button class="ctrl-btn" onclick="location.reload()">↺ Reset</button><button class="swatch" data-theme-target="dark" aria-label="Dark" aria-pressed="true"></button><button class="swatch" data-theme-target="light" aria-label="Light" aria-pressed="false"></button><button class="swatch" data-theme-target="vibrant" aria-label="Vibrant" aria-pressed="false"></button></div>

<div class="container">
  <div class="ring-wrap">
    <svg class="ring" viewBox="0 0 160 160"><circle class="ring-bg" cx="80" cy="80" r="70"/><circle class="ring-fill" id="rf" cx="80" cy="80" r="70"/></svg>
    <div class="ring-center"><div class="ring-pct" id="pct">0%</div><div class="ring-label">Automated</div></div>
  </div>
  <div class="legend" id="leg"><div class="li"><div class="ld a"></div>Automated</div><div class="li"><div class="ld m"></div>Manual refinement</div></div>
  <div class="java-badge" id="jb"><span style="font-size:20px;color:var(--green)">✓</span><span class="java-title">100% Java · No JavaScript</span></div>
</div>

<script>
const DEFAULT_THEME='dark';
function applyTheme(t){
  if(t===DEFAULT_THEME){
    document.documentElement.removeAttribute('data-theme');
    try{sessionStorage.removeItem('h2v-theme')}catch(e){}
  }else{
    document.documentElement.setAttribute('data-theme',t);
    try{sessionStorage.setItem('h2v-theme',t)}catch(e){}
  }
  syncSwatches();
}
function syncSwatches(){const c=document.documentElement.getAttribute('data-theme')||DEFAULT_THEME;document.querySelectorAll('.swatch').forEach(b=>b.setAttribute('aria-pressed',b.getAttribute('data-theme-target')===c?'true':'false'))}
syncSwatches();
document.querySelectorAll('.swatch').forEach(b=>b.addEventListener('click',()=>applyTheme(b.getAttribute('data-theme-target'))));

const rf=document.getElementById('rf'),pct=document.getElementById('pct');
const circ=2*Math.PI*70,target=80,offset=circ-(circ*target/100);
setTimeout(()=>{rf.style.strokeDashoffset=offset;let c=0;const iv=setInterval(()=>{c++;if(c>target){clearInterval(iv);return}pct.textContent='~'+c+'%'},30)},600);
setTimeout(()=>{document.getElementById('leg').classList.add('visible')},3200);
setTimeout(()=>{document.getElementById('jb').classList.add('visible')},4200);

</script></body></html>
